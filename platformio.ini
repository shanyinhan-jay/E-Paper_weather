[platformio]
; 编译期驱动选择：
;   pio run -e esp32dev_dual    -> 同时编译两套驱动，运行时自动适配屏幕
default_envs = esp32dev_dual
src_dir = e_weather

[env:esp32dev_base]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200

; Align with Arduino CLI PartitionScheme=huge_app
board_build.partitions = huge_app.csv

build_src_filter =
  +<*.ino>
  +<*.cpp>
  +<*.c>
  -<utility/*>

build_flags =
  -I e_weather
  -I e_weather/icon
  -I e_weather/utility

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
  knolleary/PubSubClient @ ^2.8
  arduino-libraries/NTPClient @ ^3.2.1
  adafruit/Adafruit GFX Library @ ^1.11.10
  adafruit/Adafruit BusIO @ ^1.17.4
  mathertel/OneButton @ ^2.5.0
  olikraus/U8g2 @ ^2.35.28
  ${PROJECT_DIR}/U8g2_for_Adafruit_GFX
  ${PROJECT_DIR}/GxEPD2_2IC

[env:esp32dev_dual]
extends = env:esp32dev_base
build_flags =
  ${env:esp32dev_base.build_flags}
  -DENABLE_DRIVER_LOCAL=1
  -DENABLE_DRIVER_GX2IC=1
